<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14161c">
    <title>Calendar Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="dashboard" id="dashboard">
      <header class="topbar" aria-label="Current date">
        <p class="today-label" id="dateLabel">MONDAY, JANUARY 1, 2026</p>
        <p class="week-label" id="weekLabel">WEEK 01</p>
      </header>

      <section class="layout" aria-label="Calendar clock dashboard">
        <div class="primary">
          <section class="clock-panel" aria-label="Current time">
            <time class="clock" id="clock" datetime="">00:00</time>
            <aside class="weather" aria-label="Weather forecast">
              <span class="weather-label">WEATHER</span>
              <span class="weather-main">
                <span class="weather-icon" id="weatherIcon" aria-hidden="true">◌</span>
                <span class="weather-temp"><span>HIGH</span> <strong id="weatherHigh">--°</strong></span>
                <span class="weather-temp"><span>LOW</span> <strong id="weatherLow">--°</strong></span>
              </span>
            </aside>
          </section>

          <section class="calendars" aria-label="Monthly calendars">
            <article class="month-card" id="currentMonth" aria-label="Current month calendar"></article>
            <article class="month-card" id="nextMonth" aria-label="Next month calendar"></article>
          </section>
        </div>

        <aside class="progress-stack" aria-label="Time progress">
          <article class="progress-item" data-period="day">
            <div class="donut accent-yellow" id="dayDonut" aria-hidden="true">
              <span>DAY</span>
            </div>
            <div class="progress-copy">
              <p><span>PASSED</span> <strong id="dayPassed">0</strong><small>%</small></p>
              <p><span>LEFT</span> <strong id="dayLeft">100</strong><small>%</small></p>
            </div>
          </article>

          <article class="progress-item" data-period="week">
            <div class="donut accent-blue" id="weekDonut" aria-hidden="true">
              <span>WEEK</span>
            </div>
            <div class="progress-copy">
              <p><span>PASSED</span> <strong id="weekPassed">0</strong><small>%</small></p>
              <p><span>LEFT</span> <strong id="weekLeft">100</strong><small>%</small></p>
            </div>
          </article>

          <article class="progress-item" data-period="month">
            <div class="donut accent-green" id="monthDonut" aria-hidden="true">
              <span>MONTH</span>
            </div>
            <div class="progress-copy">
              <p><span>PASSED</span> <strong id="monthPassed">0</strong><small>%</small></p>
              <p><span>LEFT</span> <strong id="monthLeft">100</strong><small>%</small></p>
            </div>
          </article>

          <article class="progress-item" data-period="year">
            <div class="donut accent-pink" id="yearDonut" aria-hidden="true">
              <span>YEAR</span>
            </div>
            <div class="progress-copy">
              <p><span>PASSED</span> <strong id="yearPassed">0</strong><small>%</small></p>
              <p><span>LEFT</span> <strong id="yearLeft">100</strong><small>%</small></p>
            </div>
          </article>
        </aside>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
