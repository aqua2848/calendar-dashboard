<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14161c">
    <title>Calendar Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260522-7">
  </head>
  <body>
    <main class="dashboard" id="dashboard">
      <header class="topbar" aria-label="Current date">
        <p class="today-label" id="dateLabel">MONDAY, JANUARY 1, 2026</p>
        <p class="week-label" id="weekLabel">WEEK 01</p>
      </header>

      <section class="layout" aria-label="Calendar clock dashboard">
        <div class="primary">
          <section class="clock-panel" aria-label="Current time">
            <time class="clock" id="clock" datetime="">00:00</time>
          </section>

          <section class="calendars" aria-label="Monthly calendars">
            <article class="month-card" id="currentMonth" aria-label="Current month calendar"></article>
            <article class="month-card" id="nextMonth" aria-label="Next month calendar"></article>
          </section>
        </div>

        <aside class="side-panel" aria-label="Transit weather and time progress">
          <section class="panel-section train-panel" aria-label="Train information">
            <div class="section-heading">
              <span>TRAIN</span>
              <strong>[TOKAIDO LINE]</strong>
            </div>
            <div class="train-status" id="trainStatus">
              <span class="train-status-icon" id="trainStatusIcon">✓</span>
              <div>
                <strong id="trainStatusMain">NORMAL OPERATION</strong>
                <p id="trainStatusDetail">遅延は発生していません</p>
              </div>
            </div>
            <div class="section-subheading">NEXT TRAINS (UP / TOWARD TOKYO)</div>
            <ol class="train-list" id="trainList" aria-label="Upcoming trains"></ol>
          </section>

          <section class="panel-section weather-panel" aria-label="Weather forecast">
            <div class="section-heading">
              <span>WEATHER</span>
            </div>
            <div class="weather-row">
              <span class="weather-icon" id="weatherIcon" aria-hidden="true">◌</span>
              <strong id="weatherHigh">--°</strong>
              <span>/</span>
              <strong id="weatherLow">--°</strong>
              <p class="weather-summary" id="weatherSummary">取得中</p>
            </div>
            <div class="weather-advice" id="weatherAdvice" aria-label="Clothing advice">
              <div class="weather-advice-label">服装アドバイス</div>
              <strong id="weatherAdviceHeadline">長袖＋薄手の羽織り</strong>
              <p id="weatherAdviceDetail">朝晩は肌寒いので、羽織りものがあると安心です。</p>
            </div>
          </section>

          <section class="panel-section compact-progress" aria-label="Time progress">
            <article class="compact-progress-item" data-period="day">
              <div class="donut mini-donut accent-yellow" id="dayDonut" aria-hidden="true">
                <span id="dayPercent">0%</span>
              </div>
              <strong>DAY</strong>
            </article>
            <article class="compact-progress-item" data-period="week">
              <div class="donut mini-donut accent-blue" id="weekDonut" aria-hidden="true">
                <span id="weekPercent">0%</span>
              </div>
              <strong>WEEK</strong>
            </article>
            <article class="compact-progress-item" data-period="month">
              <div class="donut mini-donut accent-green" id="monthDonut" aria-hidden="true">
                <span id="monthPercent">0%</span>
              </div>
              <strong>MONTH</strong>
            </article>
            <article class="compact-progress-item" data-period="year">
              <div class="donut mini-donut accent-pink" id="yearDonut" aria-hidden="true">
                <span id="yearPercent">0%</span>
              </div>
              <strong>YEAR</strong>
            </article>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js?v=20260522-7" defer></script>
  </body>
</html>
